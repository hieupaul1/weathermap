<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">
  <img id="graph"
       referrerpolicy="no-referrer"
       src="https://cacti.iptp.net/cacti/plugins/weathermap/output/weathermap.png"
       style="width:100vw; height:100vh; object-fit:contain;">
